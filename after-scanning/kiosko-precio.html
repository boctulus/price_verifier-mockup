<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificador de Precios – After Scanning</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,700;0,800;0,900;1,900&family=Barlow+Condensed:wght@700;800;900&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="../assets/css/kiosko-precio.css" />
</head>

<body>

  <div class="lcd-screen">

    <!-- MAIN: logo izquierda | precio derecha -->
    <div class="screen-main">

      <!-- Columna Logo -->
      <div class="col-logo">
        <img src="../assets/img/acuenta_logo_black.png" class="acuenta-logo-svg" alt="aCuenta Logo" />
      </div>

      <!-- Columna Precio -->
      <div class="col-price">

        <div class="badge-compara">
          <span class="line1">COMPARA</span>
          <span class="line2">Y AHORRA</span>
        </div>

        <div class="price-badge">
          <span class="price-text">3x$1.790</span>
        </div>

        <div class="price-info">
          <div class="normal">PRECIO NORMAL: $ 820</div>
          <div class="ahorro">AHORRO: $ 670</div>
          <div class="producto">OREO REG</div>
        </div>

      </div>
    </div><!-- /screen-main -->

    <!-- FOOTER -->
    <div class="screen-footer">
      <span class="footer-tagline">Precios baratos siempre</span>
      <div class="footer-logo-wrap">
        <img src="../assets/img/logo2.svg" class="footer-logo-svg" alt="Logo" />
      </div>
    </div>

  </div><!-- /lcd-screen -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
