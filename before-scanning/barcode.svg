<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 140" width="220" height="140">
  <!-- Barras del código -->
  <rect x="10" y="10" width="4" height="90" fill="#c0392b"/>
  <rect x="17" y="10" width="2" height="90" fill="#c0392b"/>
  <rect x="22" y="10" width="5" height="90" fill="#c0392b"/>
  <rect x="30" y="10" width="2" height="90" fill="#c0392b"/>
  <rect x="35" y="10" width="4" height="90" fill="#c0392b"/>
  <rect x="42" y="10" width="3" height="90" fill="#c0392b"/>
  <rect x="48" y="10" width="6" height="90" fill="#c0392b"/>
  <rect x="57" y="10" width="2" height="90" fill="#c0392b"/>
  <rect x="62" y="10" width="4" height="90" fill="#c0392b"/>
  <rect x="69" y="10" width="3" height="90" fill="#c0392b"/>
  <rect x="75" y="10" width="2" height="90" fill="#c0392b"/>
  <rect x="80" y="10" width="5" height="90" fill="#c0392b"/>
  <rect x="88" y="10" width="2" height="90" fill="#c0392b"/>
  <rect x="93" y="10" width="4" height="90" fill="#c0392b"/>
  <rect x="100" y="10" width="3" height="90" fill="#c0392b"/>
  <rect x="106" y="10" width="6" height="90" fill="#c0392b"/>
  <rect x="115" y="10" width="2" height="90" fill="#c0392b"/>
  <rect x="120" y="10" width="4" height="90" fill="#c0392b"/>
  <rect x="127" y="10" width="3" height="90" fill="#c0392b"/>
  <rect x="133" y="10" width="2" height="90" fill="#c0392b"/>
  <rect x="138" y="10" width="5" height="90" fill="#c0392b"/>
  <rect x="146" y="10" width="2" height="90" fill="#c0392b"/>
  <rect x="151" y="10" width="4" height="90" fill="#c0392b"/>
  <rect x="158" y="10" width="3" height="90" fill="#c0392b"/>
  <rect x="164" y="10" width="6" height="90" fill="#c0392b"/>
  <rect x="173" y="10" width="2" height="90" fill="#c0392b"/>
  <rect x="178" y="10" width="4" height="90" fill="#c0392b"/>
  <rect x="185" y="10" width="3" height="90" fill="#c0392b"/>
  <rect x="191" y="10" width="2" height="90" fill="#c0392b"/>
  <rect x="196" y="10" width="5" height="90" fill="#c0392b"/>
  <rect x="204" y="10" width="2" height="90" fill="#c0392b"/>
  <rect x="208" y="10" width="4" height="90" fill="#c0392b"/>

  <!-- Línea de escaneo animada -->
  <line x1="0" y1="55" x2="220" y2="55" stroke="#e74c3c" stroke-width="2" opacity="0.85">
    <animate attributeName="y1" values="10;100;10" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="10;100;10" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </line>

  <!-- Esquinas del recuadro de escaneo -->
  <!-- Superior izquierda -->
  <polyline points="5,5 5,30" stroke="#c0392b" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <polyline points="5,5 30,5" stroke="#c0392b" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Superior derecha -->
  <polyline points="215,5 215,30" stroke="#c0392b" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <polyline points="215,5 190,5" stroke="#c0392b" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Inferior izquierda -->
  <polyline points="5,105 5,80" stroke="#c0392b" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <polyline points="5,105 30,105" stroke="#c0392b" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Inferior derecha -->
  <polyline points="215,105 215,80" stroke="#c0392b" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <polyline points="215,105 190,105" stroke="#c0392b" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Símbolo "+" centrado -->
  <line x1="107" y1="50" x2="107" y2="62" stroke="#c0392b" stroke-width="2"/>
  <line x1="101" y1="56" x2="113" y2="56" stroke="#c0392b" stroke-width="2"/>
</svg>
