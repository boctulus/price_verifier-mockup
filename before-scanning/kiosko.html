<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verificador de Precios – Before Scanning</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet"/>

  <style>
    /* ───────── Variables ───────── */
    :root {
      --red-dark:    #b71c1c;
      --red-main:    #c62828;
      --red-footer:  #c0392b;
      --screen-bg:   #fce4ec;
      --text-red:    #c0392b;
      --white:       #ffffff;
      --tablet-w:    640px;
      --tablet-h:    400px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #6d1a0f radial-gradient(ellipse at 55% 40%, #c0392b 0%, #5a120a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Roboto', sans-serif;
      padding: 2rem 1rem;
    }

    /* ───────── Pantalla LCD ───────── */
    .lcd-screen {
      width: var(--tablet-w);
      height: var(--tablet-h);
      background: var(--screen-bg);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow:
        inset 0 0 20px rgba(0,0,0,0.2),
        0 8px 32px rgba(0,0,0,0.55),
        0 2px 8px rgba(0,0,0,0.3);
    }

    /* Reflejo sutil */
    .lcd-screen::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.11), transparent);
      pointer-events: none;
      border-radius: 14px 14px 0 0;
      z-index: 10;
    }

    /* ───────── Sección Superior ───────── */
    .screen-top {
      background: var(--screen-bg);
      padding: 28px 24px 10px 24px;
      text-align: center;
      flex-shrink: 0;
    }

    .instruction-text {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: clamp(1.1rem, 3vw, 1.55rem);
      color: var(--text-red);
      letter-spacing: -0.01em;
      line-height: 1.25;
      margin-bottom: 0;
      text-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }

    /* ───────── Área del código de barras + tarjeta ───────── */
    .barcode-area {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 0 24px 18px 24px;
      position: relative;
      background: var(--screen-bg);
    }

    /* Barcode: centrado absolutamente, flota sobre todo */
    .barcode-svg-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 1;
    }

    .barcode-svg-wrap img,
    .barcode-svg-wrap svg {
      width: 100%;
      max-width: 280px;
      height: auto;
    }

    /* ───────── Mini tarjeta eCuenta ───────── */
    .ecuenta-card-wrap {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
      z-index: 2;
    }

    .card-placeholder {
      width: 90px;
      height: 58px;
      border-radius: 7px;
      border: 2px solid rgba(0,0,0,0.12);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      background: linear-gradient(135deg, #e91e63 0%, #3f51b5 55%, #ffc107 100%);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 5px 7px;
      position: relative;
    }

    .card-chip {
      position: absolute;
      top: 10px; left: 10px;
      width: 20px; height: 14px;
      border-radius: 3px;
      background: linear-gradient(135deg, #ffe082, #ffb300);
      border: 1px solid rgba(0,0,0,0.15);
    }

    .card-logo {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 0.55rem;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      letter-spacing: 0.02em;
    }

    /* ───────── Footer rojo ───────── */
    .screen-footer {
      height: 58px;
      background: var(--red-footer);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      flex-shrink: 0;
      background-image:
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 8px,
          rgba(255,255,255,0.04) 8px,
          rgba(255,255,255,0.04) 9px
        ),
        linear-gradient(to right, #c0392b, #a93226);
    }

    .footer-tagline {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-style: italic;
      font-size: 1.25rem;
      color: var(--white);
      letter-spacing: -0.01em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.25);
      white-space: nowrap;
    }

    .footer-logo-wrap {
      background: rgba(0,0,0,0.18);
      border-radius: 8px;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .footer-logo-svg { width: 110px; height: auto; }

    /* ───────── Responsive ───────── */
    @media (max-width: 700px) {
      :root { --tablet-w: calc(100vw - 32px); --tablet-h: auto; }
      .lcd-screen { height: auto; }
      .instruction-text { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <div class="lcd-screen">

    <div class="screen-top">
      <p class="instruction-text">
        Escanea el código de barras de tu producto
      </p>
    </div>

    <div class="barcode-area">

      <!-- Código de barras: centrado absolutamente sobre toda el área -->
      <div class="barcode-svg-wrap">
        <img src="barcode.svg" alt="Código de barras" />
      </div>

      <!-- Tarjeta eCuenta: flota en el ángulo derecho -->
      <div class="ecuenta-card-wrap">
        <div class="card-placeholder">
          <div class="card-chip"></div>
          <span class="card-logo">eCuenta</span>
        </div>
      </div>

    </div>

    <div class="screen-footer">
      <span class="footer-tagline">Precios baratos siempre</span>
      <div class="footer-logo-wrap">
        <svg class="footer-logo-svg" viewBox="0 0 200 52" xmlns="http://www.w3.org/2000/svg">
          <text x="2" y="14" font-family="Nunito, sans-serif" font-weight="800"
                font-size="10" fill="rgba(255,255,255,0.85)" letter-spacing="0.3">SuperBodega</text>
          <text x="2" y="48" font-family="Nunito, sans-serif" font-weight="900"
                font-style="italic" font-size="38" fill="white" letter-spacing="-0.5">aCuenta</text>
          <path d="M 2 51 Q 100 58 198 50" stroke="white" stroke-width="1.8"
                fill="none" stroke-linecap="round" opacity="0.7"/>
        </svg>
      </div>
    </div>

  </div><!-- /lcd-screen -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
